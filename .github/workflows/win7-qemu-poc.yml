name: Verify pyfcstm and fcstm-gui on Windows 7 SP1

on:
  workflow_dispatch:
    inputs:
      win7_iso_url:
        description: Optional replacement for the WIN7_ISO_URL repository secret.
        required: false
        type: string
      win7_iso_sha256:
        description: Optional replacement for the WIN7_ISO_SHA256 repository secret.
        required: false
        type: string
      win7_image_index:
        description: Optional replacement for the WIN7_IMAGE_INDEX repository variable.
        required: false
        type: string
      win7_locale:
        description: Optional replacement for the WIN7_LOCALE repository variable.
        required: false
        type: string
      qemu_timeout_seconds:
        description: Optional QEMU guest timeout in seconds, defaults to 5400.
        required: false
        type: string
      pyfcstm_ref:
        description: pyfcstm branch or commit to build, defaults to the acceptance branch.
        required: false
        default: dev/s714-acceptance-artifacts
        type: string
  repository_dispatch:
    types: [verify-pyfcstm-main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: win7-qemu-validation
  cancel-in-progress: false

jobs:
  validate-licensed-media:
    name: Validate Windows 7 media configuration
    runs-on: ubuntu-24.04
    env:
      WIN7_ISO_URL: ${{ inputs.win7_iso_url || secrets.WIN7_ISO_URL }}
      WIN7_ISO_SHA256: ${{ inputs.win7_iso_sha256 || secrets.WIN7_ISO_SHA256 }}
      WIN7_IMAGE_INDEX: ${{ inputs.win7_image_index || vars.WIN7_IMAGE_INDEX || '1' }}
      WIN7_LOCALE: ${{ inputs.win7_locale || vars.WIN7_LOCALE || 'en-US' }}
      WIN7_ISO_FALLBACK_URLS: ${{ vars.WIN7_ISO_FALLBACK_URLS }}
      QEMU_TIMEOUT_SECONDS: ${{ inputs.qemu_timeout_seconds || '5400' }}
    steps:
      - name: Validate the licensed installation-media configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$WIN7_ISO_URL" || {
            echo "WIN7_ISO_URL must be supplied as a repository secret or dispatch input."
            exit 2
          }
          [[ "$WIN7_ISO_SHA256" =~ ^[[:xdigit:]]{64}$ ]] || {
            echo "WIN7_ISO_SHA256 must be a 64-character SHA-256 digest."
            exit 2
          }
          [[ "$WIN7_IMAGE_INDEX" =~ ^[1-9][0-9]*$ ]] || {
            echo "WIN7_IMAGE_INDEX must be a positive install.wim image index."
            exit 2
          }
          [[ "$WIN7_LOCALE" =~ ^[[:alpha:]]{2,3}-[[:alpha:]]{2,4}$ ]] || {
            echo "WIN7_LOCALE must use a language-region form such as en-US or zh-CN."
            exit 2
          }
          [[ "$QEMU_TIMEOUT_SECONDS" =~ ^[1-9][0-9]*$ ]] || {
            echo "QEMU_TIMEOUT_SECONDS must be a positive integer."
            exit 2
          }

  build-pyfcstm-acceptance:
    name: Build pyfcstm acceptance branch on Windows 2022
    needs: validate-licensed-media
    runs-on: windows-2022
    outputs:
      pyfcstm_commit: ${{ steps.metadata.outputs.pyfcstm_commit }}
      pyfcstm_ref: ${{ steps.metadata.outputs.pyfcstm_ref }}
    steps:
      - name: Checkout PoC orchestration only
        uses: actions/checkout@v4

      - name: Checkout pyfcstm acceptance source for this build
        uses: actions/checkout@v4
        with:
          repository: HansBug/pyfcstm
          ref: ${{ inputs.pyfcstm_ref || 'dev/s714-acceptance-artifacts' }}
          path: _source/pyfcstm
          fetch-depth: 1

      - name: Install Windows build tools
        shell: bash
        run: choco install make zip --no-progress --yes

      - name: Install Cairo runtime
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cairo

      - name: Expose Cairo runtime
        shell: bash
        run: echo "${{ steps.msys2.outputs.msys2-location }}\\mingw64\\bin" >> "$GITHUB_PATH"

      - name: Set up Python 3.7
        uses: actions/setup-python@v6
        with:
          python-version: "3.7"

      - name: Select Windows 7 app-local runtime files
        shell: pwsh
        run: |
          $visualStudioRoots = @(
            (Join-Path ${env:ProgramFiles} 'Microsoft Visual Studio'),
            (Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio')
          ) | Where-Object { Test-Path $_ }
          $vcruntime = $visualStudioRoots |
            ForEach-Object { Get-ChildItem -Path $_ -Filter vcruntime140_1.dll -File -Recurse } |
            Where-Object {
              $_.FullName -match '\\VC\\Redist\\MSVC\\.+\\x64\\Microsoft\.VC\d+\.CRT\\vcruntime140_1\.dll$'
            } |
            Select-Object -First 1
          if (-not $vcruntime) {
            throw 'Could not locate VCRUNTIME140_1.dll in the x64 Visual C++ Redist.'
          }
          "WIN7_VCRUNTIME140_1_FILE=$($vcruntime.FullName)" >> $env:GITHUB_ENV

      - name: Build Windows 7-compatible standalone CLI from pyfcstm acceptance source
        shell: bash
        env:
          IS_WIN: "1"
          PYINSTALLER_VERSION: "4.10"
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/_source/pyfcstm"
          rm -rf "$(cygpath -u "$LOCALAPPDATA")/pyinstaller"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt
          python -m pip install --upgrade --force-reinstall "pyinstaller==${PYINSTALLER_VERSION}"
          python -c 'import PyInstaller; assert PyInstaller.__version__ == "4.10"'
          python "$GITHUB_WORKSPACE/scripts/patch_pyinstaller_410_sanitizer.py" \
            tools/sanitize_pyinstaller_inputs.py
          make tpl app_icons
          python -m tools.generate_spec -o pyfcstm.spec --icon-dir build/icons
          python "$GITHUB_WORKSPACE/scripts/remove_win7_ucrt_binaries.py" pyfcstm.spec
          z3_msvcp_file="$(python -c 'import pathlib, z3; print(pathlib.Path(z3.__file__).with_name("lib") / "msvcp140.dll")')"
          test -f "$z3_msvcp_file"
          python "$GITHUB_WORKSPACE/scripts/add_win7_redist_binary.py" \
            pyfcstm.spec "$z3_msvcp_file"
          python "$GITHUB_WORKSPACE/scripts/add_win7_redist_binary.py" \
            pyfcstm.spec "$WIN7_VCRUNTIME140_1_FILE"
          pyinstaller pyfcstm.spec
          pyi-archive_viewer -l dist/pyfcstm.exe > build/pyi-archive.txt
          ! grep -qi 'api-ms-win-' build/pyi-archive.txt
          ! grep -qi 'ucrtbase.dll' build/pyi-archive.txt
          grep -qi 'vcruntime140_1.dll' build/pyi-archive.txt
          grep -q 'pyfcstm.png' build/pyi-archive.txt
          python - <<'PY'
          import ast
          from pathlib import Path

          toc = ast.literal_eval(Path("build/pyfcstm/PKG-00.toc").read_text())

          def walk_toc(item):
              if (
                  isinstance(item, tuple)
                  and len(item) >= 2
                  and isinstance(item[0], str)
                  and isinstance(item[1], str)
              ):
                  yield item
              if isinstance(item, (list, tuple)):
                  for child in item:
                      yield from walk_toc(child)

          assert not any(
              entry[0].lower() == "ucrtbase.dll" or entry[0].lower().startswith("api-ms-win-")
              for entry in walk_toc(toc)
          )

          msvcp_entries = [
              entry
              for entry in walk_toc(toc)
              if entry[0].replace("\\", "/").lower().rsplit("/", 1)[-1] == "msvcp140.dll"
          ]
          assert len(msvcp_entries) == 2, msvcp_entries
          root_msvcp_entries = [
              entry for entry in msvcp_entries if entry[0].replace("\\", "/").lower() == "msvcp140.dll"
          ]
          assert len(root_msvcp_entries) == 1, root_msvcp_entries
          msvcp_source = root_msvcp_entries[0][1].replace("\\", "/").lower()
          print("root msvcp140.dll source:", msvcp_source)
          # The current VS 2022 redist imports Win10-only CopyFile2.  Keep the
          # z3 wheel's compatible runtime instead of injecting that host copy.
          assert "/microsoft visual studio/" not in msvcp_source, msvcp_source
          assert "/z3/lib/msvcp140.dll" in msvcp_source, msvcp_source

          vcruntime_entries = [
              entry for entry in walk_toc(toc) if entry[0].lower() == "vcruntime140_1.dll"
          ]
          assert len(vcruntime_entries) == 1, vcruntime_entries
          vcruntime_source = vcruntime_entries[0][1].replace("\\", "/").lower()
          print("vcruntime140_1.dll source:", vcruntime_source)
          assert "/microsoft visual studio/" in vcruntime_source, vcruntime_source
          assert "/vc/redist/msvc/" in vcruntime_source, vcruntime_source
          assert vcruntime_source.endswith("/vcruntime140_1.dll"), vcruntime_source
          PY
          test -f dist/pyfcstm.exe
          ./dist/pyfcstm.exe -v
          ./dist/pyfcstm.exe -h

      - name: Create a minimal guest payload
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          source_dir="$GITHUB_WORKSPACE/_source/pyfcstm"
          payload_dir="$GITHUB_WORKSPACE/build-payload"
          mkdir -p "$payload_dir"
          cp "$source_dir/dist/pyfcstm.exe" "$payload_dir/pyfcstm.exe"
          cp "$source_dir/docs/source/tutorials/simulation/example6_transition_priority.full.fcstm" \
            "$payload_dir/smt-verify.fcstm"
          exe_sha256="$(python -c 'import hashlib, pathlib, sys; print(hashlib.sha256(pathlib.Path(sys.argv[1]).read_bytes()).hexdigest().upper())' "$payload_dir/pyfcstm.exe")"
          pyinstaller_version="$(python -c 'import PyInstaller; print(PyInstaller.__version__)')"
          api_set_forwarders="$(grep -ci 'api-ms-win-' "$source_dir/build/pyi-archive.txt" || true)"
          test "$api_set_forwarders" -eq 0
          pyfcstm_commit="$(git -C "$source_dir" rev-parse HEAD)"
          {
            printf 'pyfcstm_commit=%s\n' "$pyfcstm_commit"
            printf 'pyfcstm_ref=%s\n' "${{ inputs.pyfcstm_ref || 'dev/s714-acceptance-artifacts' }}"
            printf 'pyinstaller_version=%s\n' "$pyinstaller_version"
            printf 'api_ms_win_forwarders=%s\n' "$api_set_forwarders"
            printf 'python_version=%s\n' "$(python --version)"
            printf 'pyfcstm_exe_sha256=%s\n' "$exe_sha256"
          } > "$payload_dir/build-metadata.txt"
          printf 'pyfcstm_commit=%s\n' "$pyfcstm_commit" >> "$GITHUB_OUTPUT"
          printf 'pyfcstm_ref=%s\n' "${{ inputs.pyfcstm_ref || 'dev/s714-acceptance-artifacts' }}" >> "$GITHUB_OUTPUT"

      - name: Upload only the executable and test payload
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-win7-payload
          path: build-payload
          retention-days: 14
          if-no-files-found: error

  build-fcstm-gui:
    name: Build fcstm-gui main on Windows 2022
    needs: validate-licensed-media
    runs-on: windows-2022
    outputs:
      fcstm_gui_commit: ${{ steps.metadata.outputs.fcstm_gui_commit }}
    steps:
      - name: Checkout PoC orchestration only
        uses: actions/checkout@v4

      - name: Checkout fcstm-gui main for this build
        uses: actions/checkout@v4
        with:
          repository: zhougut/fcstm-gui
          ref: main
          path: _source/fcstm-gui
          fetch-depth: 1

      - name: Install Windows GUI build tools
        shell: bash
        run: choco install make zip --no-progress --yes

      - name: Install Cairo runtime
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cairo

      - name: Set up Python 3.7
        uses: actions/setup-python@v6
        with:
          python-version: "3.7"

      - name: Set up Java 11 for the GUI build and guest runtime
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"

      - name: Select Windows 7 app-local runtime files
        shell: pwsh
        run: |
          $visualStudioRoots = @(
            (Join-Path ${env:ProgramFiles} 'Microsoft Visual Studio'),
            (Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio')
          ) | Where-Object { Test-Path $_ }
          $vcruntime = $visualStudioRoots |
            ForEach-Object { Get-ChildItem -Path $_ -Filter vcruntime140_1.dll -File -Recurse } |
            Where-Object {
              $_.FullName -match '\\VC\\Redist\\MSVC\\.+\\x64\\Microsoft\.VC\d+\.CRT\\vcruntime140_1\.dll$'
            } |
            Select-Object -First 1
          if (-not $vcruntime) {
            throw 'Could not locate VCRUNTIME140_1.dll in the x64 Visual C++ Redist.'
          }
          "WIN7_VCRUNTIME140_1_FILE=$($vcruntime.FullName)" >> $env:GITHUB_ENV

      - name: Build fcstm-gui main with its documented Windows method
        shell: bash
        env:
          FCSTM_GUI_BUILD_MODE: onefile
          FCSTM_GUI_PRODUCT_LAYOUT: onefile
          QT_QPA_PLATFORM: windows
        run: |
          set -euo pipefail
          source_dir="$GITHUB_WORKSPACE/_source/fcstm-gui"
          mingw_bin="$(cygpath -u '${{ steps.msys2.outputs.msys2-location }}\mingw64\bin')"
          export PATH="$PATH:$mingw_bin"
          cd "$source_dir"
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt -r requirements-test.txt -r requirements.txt
          make ui
          mkdir -p build
          python main.py --self-check --json-report build/source-self-check.json 2>&1 | tee build/source-self-check.log
          grep -F '"status": "passed"' build/source-self-check.json
          grep -F '"passed": 182' build/source-self-check.json
          pyinstaller --noconfirm main.spec 2>&1 | tee build/pyinstaller.log
          test -f dist/fcstm-gui.exe
          dist/fcstm-gui.exe --self-check --json-report build/onefile-self-check.json 2>&1 | tee build/onefile-self-check.log
          grep -F '"status": "passed"' build/onefile-self-check.json
          grep -F '"passed": 182' build/onefile-self-check.json

      - name: Create a portable Java runtime for the Win7 guest
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          source_dir="$GITHUB_WORKSPACE/_source/fcstm-gui"
          payload_dir="$GITHUB_WORKSPACE/gui-payload"
          mkdir -p "$payload_dir"
          java_home="$(cygpath -u "${JAVA_HOME_11_X64:-$JAVA_HOME}")"
          payload_dir_win="$(cygpath -w "$payload_dir")"
          "$java_home/bin/jlink.exe" \
            --add-modules ALL-MODULE-PATH \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2 \
            --output "${payload_dir_win}\\java-runtime"
          test -f "$payload_dir/java-runtime/bin/java.exe"
          "$payload_dir/java-runtime/bin/java.exe" -version 2>&1 | tee "$payload_dir/java-version.txt"
          cp "$source_dir/dist/fcstm-gui.exe" "$payload_dir/fcstm-gui.exe"
          cp "$source_dir/build/source-self-check.json" "$payload_dir/source-self-check.json"
          cp "$source_dir/build/onefile-self-check.json" "$payload_dir/onefile-self-check.json"
          cp "$source_dir/build/onefile-self-check.log" "$payload_dir/onefile-self-check.log"
          cp "$source_dir/build/pyinstaller.log" "$payload_dir/pyinstaller.log"
          cp "$WIN7_VCRUNTIME140_1_FILE" "$payload_dir/vcruntime140_1.dll"
          gui_sha256="$(python -c 'import hashlib, pathlib; print(hashlib.sha256(pathlib.Path("gui-payload/fcstm-gui.exe").read_bytes()).hexdigest().upper())')"
          fcstm_gui_commit="$(git -C "$source_dir" rev-parse HEAD)"
          {
            printf 'fcstm_gui_commit=%s\n' "$fcstm_gui_commit"
            printf 'fcstm_gui_ref=main\n'
            printf 'fcstm_gui_exe_sha256=%s\n' "$gui_sha256"
            printf 'python_version=%s\n' "$(python --version)"
            printf 'pyinstaller_version=%s\n' "$(python -c 'import PyInstaller; print(PyInstaller.__version__)')"
            printf 'pyfcstm_dependency=%s\n' "$(python -c 'import importlib_metadata; print(importlib_metadata.distribution("pyfcstm").version)')"
          } > "$payload_dir/fcstm-gui-build-metadata.txt"
          printf 'fcstm_gui_commit=%s\n' "$fcstm_gui_commit" >> "$GITHUB_OUTPUT"

      - name: Upload the fcstm-gui Windows payload
        uses: actions/upload-artifact@v4
        with:
          name: fcstm-gui-win7-payload
          path: gui-payload
          retention-days: 14
          if-no-files-found: error

  verify-on-win7:
    name: Boot Windows 7 SP1 and execute both built products
    needs: [validate-licensed-media, build-pyfcstm-acceptance, build-fcstm-gui]
    runs-on: ubuntu-24.04
    env:
      WIN7_ISO_URL: ${{ inputs.win7_iso_url || secrets.WIN7_ISO_URL }}
      WIN7_ISO_SHA256: ${{ inputs.win7_iso_sha256 || secrets.WIN7_ISO_SHA256 }}
      WIN7_IMAGE_INDEX: ${{ inputs.win7_image_index || vars.WIN7_IMAGE_INDEX || '1' }}
      WIN7_LOCALE: ${{ inputs.win7_locale || vars.WIN7_LOCALE || 'en-US' }}
      WIN7_ISO_FALLBACK_URLS: ${{ vars.WIN7_ISO_FALLBACK_URLS }}
      QEMU_TIMEOUT_SECONDS: ${{ inputs.qemu_timeout_seconds || '5400' }}
    steps:
      - name: Checkout PoC orchestration only
        uses: actions/checkout@v4

      - name: Download the pyfcstm acceptance payload
        uses: actions/download-artifact@v4
        with:
          name: pyfcstm-win7-payload
          path: build-payload

      - name: Download the fcstm-gui Windows payload
        uses: actions/download-artifact@v4
        with:
          name: fcstm-gui-win7-payload
          path: build-payload

      - name: Validate the licensed installation-media configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$WIN7_ISO_URL" || {
            echo "WIN7_ISO_URL must be supplied as a repository secret or dispatch input."
            exit 2
          }
          [[ "$WIN7_ISO_SHA256" =~ ^[[:xdigit:]]{64}$ ]] || {
            echo "WIN7_ISO_SHA256 must be a 64-character SHA-256 digest."
            exit 2
          }
          [[ "$WIN7_IMAGE_INDEX" =~ ^[1-9][0-9]*$ ]] || {
            echo "WIN7_IMAGE_INDEX must be a positive install.wim image index."
            exit 2
          }
          [[ "$WIN7_LOCALE" =~ ^[[:alpha:]]{2,3}-[[:alpha:]]{2,4}$ ]] || {
            echo "WIN7_LOCALE must use a language-region form such as en-US or zh-CN."
            exit 2
          }
          [[ "$QEMU_TIMEOUT_SECONDS" =~ ^[1-9][0-9]*$ ]] || {
            echo "QEMU_TIMEOUT_SECONDS must be a positive integer."
            exit 2
          }

      - name: Install QEMU and FAT-image tooling
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            ca-certificates curl dosfstools mtools netcat-openbsd p7zip-full qemu-system-x86 qemu-utils wimtools xorriso

      - name: Require KVM on the GitHub-hosted runner
        shell: bash
        run: |
          set -euo pipefail
          test -e /dev/kvm || {
            echo "The selected GitHub-hosted runner does not expose /dev/kvm."
            exit 1
          }
          if ! test -r /dev/kvm || ! test -w /dev/kvm; then
            sudo chmod 0666 /dev/kvm
          fi
          test -r /dev/kvm
          test -w /dev/kvm
          ls -l /dev/kvm
          qemu-system-x86_64 --version

      - name: Download and verify the licensed Windows 7 ISO
        id: media
        shell: bash
        run: |
          set -euo pipefail
          work_dir="$RUNNER_TEMP/win7-poc"
          mkdir -p "$work_dir"
          install_iso="$work_dir/windows-7.iso"
          DOWNLOAD_FALLBACK_URLS="$WIN7_ISO_FALLBACK_URLS" \
            bash scripts/download_with_ranges.sh "$WIN7_ISO_URL" "$install_iso"
          actual_iso_sha256="$(sha256sum "$install_iso" | awk '{print tolower($1)}')"
          expected_iso_sha256="$(printf '%s' "$WIN7_ISO_SHA256" | tr '[:upper:]' '[:lower:]')"
          printf 'Downloaded ISO SHA-256: %s\n' "$actual_iso_sha256"
          [[ "$actual_iso_sha256" == "$expected_iso_sha256" ]] || {
            echo "Downloaded ISO SHA-256 did not match WIN7_ISO_SHA256."
            exit 1
          }
          echo "ISO SHA-256 verified."
          inspection_dir="$work_dir/iso-inspection"
          mkdir -p "$inspection_dir"
          df -h "$work_dir"
          7z e -y "-o$inspection_dir" "$install_iso" sources/install.wim
          image_info="$work_dir/install-image-info.txt"
          if ! wimlib-imagex info "$inspection_dir/install.wim" "$WIN7_IMAGE_INDEX" > "$image_info"; then
            cat "$image_info"
            exit 1
          fi
          cat "$image_info"
          grep -E '^Name:.*Windows 7' "$image_info" >/dev/null
          grep -E '^Architecture:[[:space:]]+x86_64' "$image_info" >/dev/null
          rm -rf "$inspection_dir"

          expected_pyfcstm_sha256="$(sha256sum build-payload/pyfcstm.exe | awk '{print toupper($1)}')"
          expected_gui_sha256="$(sha256sum build-payload/fcstm-gui.exe | awk '{print toupper($1)}')"
          ucrt_zip="$work_dir/WindowsUCRT.zip"
          ucrt_directory="$work_dir/win7-ucrt"
          ucrt_msu_directory="$work_dir/win7-ucrt-msu"
          curl --fail --location --retry 5 --retry-all-errors --silent --show-error \
            --output "$ucrt_zip" \
            'https://download.microsoft.com/download/3/1/1/311c06c1-f162-405c-b538-d9dc3a4007d1/WindowsUCRT.zip'
          mkdir -p "$ucrt_directory"
          7z e -y "-o$ucrt_directory" "$ucrt_zip" 'Windows6.1-KB3118401-x64.msu' >/dev/null
          mkdir -p "$ucrt_msu_directory"
          7z e -y "-o$ucrt_msu_directory" "$ucrt_directory/Windows6.1-KB3118401-x64.msu" '*.cab' >/dev/null
          ucrt_cab="$ucrt_msu_directory/Windows6.1-KB3118401-x64.cab"
          test -f "$ucrt_cab"
          cp "$ucrt_cab" build-payload/win7-ucrt.cab
          ucrt_sha256="$(sha256sum build-payload/win7-ucrt.cab | awk '{print toupper($1)}')"
          printf 'win7_ucrt_cab_sha256=%s\n' "$ucrt_sha256" >> build-payload/build-metadata.txt
          bash scripts/build_payload_iso.sh build-payload "$work_dir/bootstrap.iso" "$WIN7_IMAGE_INDEX" "$WIN7_LOCALE"
          bash scripts/build_unattend_floppy.sh "$work_dir/unattend.img" "$WIN7_IMAGE_INDEX" "$WIN7_LOCALE"
          bash scripts/build_results_image.sh "$work_dir/win7-results.img"

          printf 'install_iso=%s\n' "$install_iso" >> "$GITHUB_OUTPUT"
          printf 'bootstrap_iso=%s\n' "$work_dir/bootstrap.iso" >> "$GITHUB_OUTPUT"
          printf 'unattend_image=%s\n' "$work_dir/unattend.img" >> "$GITHUB_OUTPUT"
          printf 'results_image=%s\n' "$work_dir/win7-results.img" >> "$GITHUB_OUTPUT"
          printf 'work_dir=%s\n' "$work_dir" >> "$GITHUB_OUTPUT"
          printf 'image_info=%s\n' "$image_info" >> "$GITHUB_OUTPUT"
          printf 'pyfcstm_sha256=%s\n' "$expected_pyfcstm_sha256" >> "$GITHUB_OUTPUT"
          printf 'fcstm_gui_sha256=%s\n' "$expected_gui_sha256" >> "$GITHUB_OUTPUT"

      - name: Install Windows 7 SP1 and run the candidate executable
        id: qemu
        continue-on-error: true
        shell: bash
        run: |
          bash scripts/run_win7_qemu.sh \
            "${{ steps.media.outputs.install_iso }}" \
            "${{ steps.media.outputs.bootstrap_iso }}" \
            "${{ steps.media.outputs.unattend_image }}" \
            "${{ steps.media.outputs.results_image }}" \
            "${{ steps.media.outputs.work_dir }}" \
            "$QEMU_TIMEOUT_SECONDS"

      - name: Extract and validate guest evidence
        id: collect
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          bash scripts/collect_win7_results.sh \
            "${{ steps.media.outputs.results_image }}" \
            "${{ steps.media.outputs.pyfcstm_sha256 }}" \
            "${{ steps.media.outputs.fcstm_gui_sha256 }}" \
            guest-evidence

      - name: Upload non-redistributable verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win7-verification-evidence
          path: |
            ${{ runner.temp }}/win7-poc/serial.log
            ${{ runner.temp }}/win7-poc/qemu-screen.ppm
            ${{ runner.temp }}/win7-poc/qemu-exit-status.txt
            ${{ runner.temp }}/win7-poc/win7-results.img
            ${{ steps.media.outputs.image_info }}
            guest-evidence
          retention-days: 30
          if-no-files-found: warn

      - name: Fail unless QEMU and guest evidence both passed
        if: always()
        shell: bash
        run: |
          test "${{ steps.qemu.outcome }}" = success
          test "${{ steps.collect.outcome }}" = success
